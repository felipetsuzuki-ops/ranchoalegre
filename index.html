<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Fazenda - Gestão Grátis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

<style>
:root {
  --g: #2a5c1f; --gl: #e8f5e2; --tx: #1a1f16; --br: #e0e5db;
  --st: env(safe-area-inset-top, 20px); --sb: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f2f4f0; color: var(--tx); height: 100vh; overflow: hidden; }

/* Splash Screen Minimalista */
#splash { position: fixed; inset: 0; z-index: 9999; background: var(--g); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
#splash.hide { opacity: 0; pointer-events: none; }

#app { height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--g); padding: var(--st) 18px 14px; color: #fff; }
#pages { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.page { display: none; } .page.active { display: block; }

.card { background: #fff; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.btn { background: var(--g); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
.btn-alt { background: #5d7a54; }

.bnav { background: #fff; border-top: 1px solid var(--br); display: flex; padding-bottom: var(--sb); }
.nb { flex: 1; padding: 15px; border: none; background: none; font-size: 12px; color: #a8b0a2; text-align: center; }
.nb.active { color: var(--g); font-weight: bold; }

.lrow { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
.empty { text-align: center; color: #999; padding: 20px; }
</style>
</head>
<body>

<div id="splash">
    <div style="color: white; font-weight: bold; font-size: 20px;">🚜 Carregando Fazenda...</div>
</div>

<div id="app">
    <div class="topbar">
        <h2 id="tt">Início</h2>
    </div>

    <div id="pages">
        <div id="pg-dash" class="page active">
            <div class="card" id="dash-resumo">Bem-vindo, Samuel.</div>
            <div class="card">
                <h3>Resumo de Estoque</h3>
                <div id="resumo-estoque"></div>
            </div>
        </div>

        <div id="pg-compras" class="page">
            <div class="card">
                <h3>Entrada de Insumos</h3>
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Importe o arquivo XML que você recebe por e-mail ou via WhatsApp do fornecedor.</p>
                
                <input type="file" id="xml-input" accept=".xml" style="display:none" onchange="importarXML()">
                <button class="btn" onclick="document.getElementById('xml-input').click()">📄 Importar XML da Nota</button>
                
                <button class="btn btn-alt" onclick="alert('Dica: Peça sempre o arquivo .xml para seu fornecedor. É a forma mais rápida e 100% grátis de alimentar o sistema.')">💡 Por que usar XML?</button>
            </div>
            
            <div class="card">
                <h3>Últimas Compras</h3>
                <div id="lista-compras"></div>
            </div>
        </div>

        <div id="pg-estoque" class="page">
            <div class="card">
                <h3>Baixa de Insumos</h3>
                <select id="sel-insumo" style="width:100%; padding:10px; margin-top:10px; border-radius:8px;"></select>
                <input type="number" id="qtd-uso" placeholder="Quantidade usada" style="width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc;">
                <button class="btn" onclick="registrarUso()">Dar Baixa</button>
            </div>
            <div id="lista-estoque-completa"></div>
        </div>
    </div>

    <nav class="bnav">
        <button class="nb active" onclick="nav('dash', this)">📊 Painel</button>
        <button class="nb" onclick="nav('compras', this)">🛒 Compras</button>
        <button class="nb" onclick="nav('estoque', this)">📦 Estoque</button>
    </nav>
</div>

<script>
// Banco de Dados Local (LocalStorage) - 100% Grátis
let db = JSON.parse(localStorage.getItem('fazenda_v1') || '{"compras":[], "usos":[]}');
const salvar = () => localStorage.setItem('fazenda_v1', JSON.stringify(db));

// Inicialização rápida
window.onload = () => {
    renderDash();
    setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
    }, 600);
};

function nav(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    el.classList.add('active');
    document.getElementById('tt').innerText = el.innerText;
    
    if(id === 'compras') renderCompras();
    if(id === 'estoque') renderEstoque();
}

// IMPORTAÇÃO DE XML (GRÁTIS E SEM API)
function importarXML() {
    const file = document.getElementById('xml-input').files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(e.target.result, "text/xml");
        
        // Localiza os itens da nota (padrão NF-e brasileira)
        const itens = xml.getElementsByTagName("det");
        if (itens.length === 0) {
            alert("Não encontramos produtos neste XML. Verifique se é uma NF-e válida.");
            return;
        }

        for (let i = 0; i < itens.length; i++) {
            const nome = itens[i].getElementsByTagName("xProd")[0]?.textContent || "Produto";
            const qtd = itens[i].getElementsByTagName("qCom")[0]?.textContent || "0";
            const valor = itens[i].getElementsByTagName("vUnCom")[0]?.textContent || "0";

            db.compras.push({
                id: Date.now() + Math.random(),
                nome: nome,
                qtd: parseFloat(qtd),
                valor: parseFloat(valor),
                data: new Date().toLocaleDateString()
            });
        }

        salvar();
        renderCompras();
        alert(itens.length + " itens importados com sucesso!");
    };
    reader.readAsText(file);
}

function renderCompras() {
    const cont = document.getElementById('lista-compras');
    if (db.compras.length === 0) {
        cont.innerHTML = '<div class="empty">Nenhuma compra importada.</div>';
        return;
    }
    cont.innerHTML = db.compras.slice(-10).reverse().map(c => `
        <div class="lrow">
            <span>${c.nome}</span>
            <b>${c.qtd} un</b>
        </div>
    `).join('');
}

function renderEstoque() {
    const saldos = {};
    db.compras.forEach(c => saldos[c.nome] = (saldos[c.nome] || 0) + c.qtd);
    db.usos.forEach(u => { if(saldos[u.nome]) saldos[u.nome] -= u.qtd; });

    const sel = document.getElementById('sel-insumo');
    sel.innerHTML = Object.keys(saldos).map(k => `<option value="${k}">${k}</option>`).join('');

    const cont = document.getElementById('lista-estoque-completa');
    cont.innerHTML = Object.keys(saldos).map(k => `
        <div class="card">
            <b>${k}</b>: ${saldos[k].toFixed(2)} em estoque
        </div>
    `).join('') || '<div class="empty">Estoque vazio.</div>';
}

function registrarUso() {
    const nome = document.getElementById('sel-insumo').value;
    const qtd = parseFloat(document.getElementById('qtd-uso').value);
    if (!nome || !qtd) return;

    db.usos.push({ nome, qtd, data: new Date().toISOString() });
    salvar();
    renderEstoque();
    alert("Baixa registrada!");
}

function renderDash() {
    const total = db.compras.length;
    document.getElementById('dash-resumo').innerHTML = `<h3>Olá, Samuel</h3><p>Seu sistema está pronto. Você já importou ${total} itens.</p>`;
}
</script>
</body>
</html>
