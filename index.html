<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fazenda">
<meta name="theme-color" content="#2a5c1f">
<title>Gestao da Fazenda</title>
<link id="pwa-icon" rel="apple-touch-icon">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --g: #2a5c1f; --g2: #3d8530; --gl: #e8f5e2;
  --t: #9b6031; --tl: #fdf0e5;
  --a: #c8920a; --al: #fff8e0;
  --d: #d63031; --dl: #ffeaea;
  --b: #1a5ec8; --bl: #e3f0ff;
  --bg: #f2f4f0; --card: #fff;
  --tx: #1a1f16; --tx2: #6b7566; --tx3: #a8b0a2;
  --br: #e0e5db;
  --st: env(safe-area-inset-top, 44px);
  --sb: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Centralização para ficar igual no PC e Celular */
html, body { height: 100%; background: #cbd5e1; display: flex; justify-content: center; overflow: hidden; font-family: -apple-system, sans-serif; }
#app { width: 100%; max-width: 480px; height: 100%; background: var(--bg); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.2); }

.topbar { background: var(--g); padding: var(--st) 18px 14px; display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
.tb-title { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -.4px; }
#pages { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.page { display: none; }
.page.active { display: block; }
.card { background: var(--card); border-radius: 16px; box-shadow: 0 2px 14px rgba(0,0,0,.07); margin-bottom: 14px; padding: 16px; }
.btn { font-weight: 700; font-size: 15px; padding: 14px; border: none; border-radius: 12px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
.btn-g { background: var(--g); color: #fff; }
.btn-b { background: var(--b); color: #fff; }
.btn-xls { background: #1d6f42; color: #fff; }
.fi, .fsel, .fta { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid var(--br); border-radius: 10px; background: #f9f9f9; font-size: 15px; }
.fta { height: 100px; resize: none; }
.bnav { background: rgba(255,255,255,.97); border-top: 1px solid var(--br); display: flex; padding-bottom: var(--sb); flex-shrink: 0; }
.nb { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px; font-size: 10px; font-weight: 600; color: var(--tx3); background: none; border: none; cursor: pointer; }
.nb.active { color: var(--g); }
.ni { font-size: 20px; margin-bottom: 3px; }
#splash { position: absolute; inset: 0; z-index: 999; background: var(--g); display: flex; align-items: center; justify-content: center; transition: 0.4s; }
#splash.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="app">
  <div id="splash">
    <div style="color: white; font-weight: bold; text-align: center;">🚜<br>Fazenda Local</div>
  </div>

  <div class="topbar"><div class="tb-title" id="tt">Painel</div></div>

  <div id="pages">
    <div id="pg-dash" class="page active">
      <div class="card">
        <h3>Olá, Samuel</h3>
        <p id="info-dash">Carregando...</p>
        <button class="btn btn-xls" onclick="exportarEstoqueExcel()">📊 Baixar Estoque (Excel)</button>
      </div>
    </div>

    <div id="pg-compras" class="page">
      <div class="card" style="background: var(--bl);">
        <h4 style="color: var(--b)">Extrair Texto da Foto</h4>
        <p style="font-size: 11px; margin-bottom: 5px;">Copie o texto da foto da nota e cole aqui:</p>
        <textarea id="txt-camera" class="fta" placeholder="Cole o texto aqui..."></textarea>
        <button class="btn btn-b" onclick="processarTextoLocal()">Adicionar Itens</button>
      </div>
      <div class="card">
        <h4>Importar XML</h4>
        <input type="file" id="xmlInput" accept=".xml" style="display:none" onchange="lerXML()">
        <button class="btn btn-g" onclick="document.getElementById('xmlInput').click()">Selecionar XML</button>
      </div>
      <div id="lista-compras-html"></div>
    </div>

    <div id="pg-estoque" class="page">
      <div class="card">
        <h4>Baixa</h4>
        <select id="sel-insumo-local" class="fsel"></select>
        <input type="number" id="qtd-baixa-local" class="fi" placeholder="Quantidade">
        <button class="btn btn-g" onclick="confirmarBaixa()">Confirmar</button>
      </div>
      <div id="lista-estoque-html"></div>
    </div>

    <div id="pg-equipe" class="page">
      <div class="card">
        <h4>Nova Atividade</h4>
        <input type="text" id="func-nome" class="fi" placeholder="Funcionário">
        <input type="text" id="func-tarefa" class="fi" placeholder="Tarefa">
        <button class="btn btn-g" onclick="salvarTarefa()">Salvar</button>
      </div>
      <div id="lista-tarefas"></div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nb active" onclick="nav('dash', this, 'Painel')"><span class="ni">📊</span>Painel</button>
    <button class="nb" onclick="nav('compras', this, 'Compras')"><span class="ni">🛒</span>Compras</button>
    <button class="nb" onclick="nav('estoque', this, 'Estoque')"><span class="ni">📦</span>Estoque</button>
    <button class="nb" onclick="nav('equipe', this, 'Equipe')"><span class="ni">👥</span>Equipe</button>
  </nav>
</div>

<script>
// Banco de dados Local
var banco = JSON.parse(localStorage.getItem('fazenda_local_v1') || '{"compras":[], "usos":[], "tarefas":[]}');
function salvar() { localStorage.setItem('fazenda_local_v1', JSON.stringify(banco)); }

window.onload = function() {
    renderDash();
    setTimeout(function() { document.getElementById('splash').classList.add('hide'); }, 1000);
};

function nav(id, btn, tit) {
    var p = document.getElementsByClassName('page');
    for(var i=0; i<p.length; i++) p[i].classList.remove('active');
    var b = document.getElementsByClassName('nb');
    for(var i=0; i<b.length; i++) b[i].classList.remove('active');
    document.getElementById('pg-'+id).classList.add('active');
    btn.classList.add('active');
    document.getElementById('tt').innerText = tit;
    if(id==='compras') renderCompras();
    if(id==='estoque') renderEstoque();
    if(id==='equipe') renderTarefas();
}

// LÓGICA SEM API (PROCESSAMENTO DE TEXTO)
function processarTextoLocal() {
    var txt = document.getElementById('txt-camera').value;
    if(!txt) return;
    var linhas = txt.split('\n');
    linhas.forEach(function(l) {
        var preco = l.match(/(\d+[\.,]\d{2})/); // Procura padrão de preço
        if(preco) {
            banco.compras.push({
                id: Date.now() + Math.random(),
                nome: l.replace(preco[0], '').trim().toUpperCase().substring(0,25),
                qtd: 1,
                data: new Date().toLocaleDateString()
            });
        }
    });
    salvar(); renderCompras();
    document.getElementById('txt-camera').value = "";
    alert("Processado!");
}

function lerXML() {
    var file = document.getElementById('xmlInput').files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
        var xml = new DOMParser().parseFromString(e.target.result, "text/xml");
        var itens = xml.getElementsByTagName("det");
        for(var i=0; i<itens.length; i++) {
            banco.compras.push({
                id: Date.now()+i,
                nome: itens[i].getElementsByTagName("xProd")[0]?.textContent || "ITEM",
                qtd: parseFloat(itens[i].getElementsByTagName("qCom")[0]?.textContent || 0),
                data: new Date().toLocaleDateString()
            });
        }
        salvar(); renderCompras();
    };
    reader.readAsText(file);
}

function renderCompras() {
    var c = document.getElementById('lista-compras-html');
    c.innerHTML = "";
    banco.compras.slice(-10).reverse().forEach(function(item) {
        var d = document.createElement('div');
        d.style.padding = "10px"; d.style.borderBottom = "1px solid #eee";
        d.innerHTML = "<span>"+item.nome+"</span> <b style='float:right'>"+item.qtd+" un</b>";
        c.appendChild(d);
    });
}

function renderEstoque() {
    var saldo = {};
    banco.compras.forEach(function(i) { saldo[i.nome] = (saldo[i.nome] || 0) + i.qtd; });
    banco.usos.forEach(function(u) { if(saldo[u.nome]) saldo[u.nome] -= u.qtd; });

    var sel = document.getElementById('sel-insumo-local');
    sel.innerHTML = "";
    var lista = document.getElementById('lista-estoque-html');
    lista.innerHTML = "";

    for(var n in saldo) {
        var o = document.createElement('option'); o.value = n; o.innerText = n; sel.appendChild(o);
        var card = document.createElement('div'); card.className = "card";
        card.innerHTML = "<b>"+n+"</b> <span style='float:right'>"+saldo[n].toFixed(2)+"</span>";
        lista.appendChild(card);
    }
}

function confirmarBaixa() {
    var n = document.getElementById('sel-insumo-local').value;
    var q = parseFloat(document.getElementById('qtd-baixa-local').value);
    if(n && q) {
        banco.usos.push({ nome: n, qtd: q, data: new Date().toISOString() });
        salvar(); renderEstoque();
    }
}

function exportarEstoqueExcel() {
    var saldo = {};
    banco.compras.forEach(function(i) { saldo[i.nome] = (saldo[i.nome] || 0) + i.qtd; });
    banco.usos.forEach(function(u) { if(saldo[u.nome]) saldo[u.nome] -= u.qtd; });
    
    var dados = [];
    for(var k in saldo) { dados.push({ "Insumo": k, "Saldo": saldo[k] }); }
    
    var ws = XLSX.utils.json_to_sheet(dados);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Estoque");
    XLSX.writeFile(wb, "estoque_fazenda.xlsx");
}

function salvarTarefa() {
    var n = document.getElementById('func-nome').value;
    var t = document.getElementById('func-tarefa').value;
    if(n && t) {
        banco.tarefas.push({ n: n, t: t, d: new Date().toLocaleString() });
        salvar(); renderTarefas();
    }
}

function renderTarefas() {
    var c = document.getElementById('lista-tarefas');
    c.innerHTML = "";
    banco.tarefas.slice(-10).reverse().forEach(function(t) {
        var d = document.createElement('div'); d.className = "card";
        d.innerHTML = "<b>"+t.n+"</b><br>"+t.t+"<br><small style='color:gray'>"+t.d+"</small>";
        c.appendChild(d);
    });
}

function renderDash() {
    document.getElementById('info-dash').innerText = banco.compras.length + " entradas registradas.";
}
</script>
</body>
</html>
